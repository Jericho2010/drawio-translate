<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowArchitect: LLM to Draw.io</title>
    <style>
:root {
    --bg-color: #f4f5f7;
    --text-color: #333;
    --border-color: #ccc;
    --accent-color: #0078d4; /* Microsoft Blue */
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    background-color: var(--bg-color);
    color: var(--text-color);
}

header {
    background-color: #fff;
    padding: 15px 20px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--border-color);
}

header h1 {
    margin: 0;
    font-size: 1.5rem;
    margin-right: 20px;
    color: #111;
}

header p {
    margin: 0;
    flex-grow: 1;
    font-size: 0.9rem;
    color: #666;
}

#renderBtn {
    background-color: var(--accent-color);
    color: #fff;
    border: none;
    padding: 10px 20px;
    font-size: 1rem;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    transition: background-color 0.2s;
}

#renderBtn:hover {
    background-color: #005a9e;
}

#copyXmlBtn, #downloadBtn {
    background-color: #fff;
    color: var(--accent-color);
    border: 2px solid var(--accent-color);
    padding: 8px 16px;
    font-size: 0.9rem;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
    margin-right: 8px;
}

#copyXmlBtn:hover, #downloadBtn:hover {
    background-color: var(--accent-color);
    color: #fff;
}

.container {
    display: flex;
    flex-grow: 1;
    overflow: hidden;
}

.left-pane {
    width: 30%;
    min-width: 300px;
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
}

#csvInput {
    flex-grow: 1;
    padding: 15px;
    font-family: monospace;
    font-size: 14px;
    border: none;
    resize: none;
    background-color: #fafafa;
}

#csvInput:focus {
    outline: none;
    background-color: #fff;
}

.right-pane {
    flex-grow: 1;
    display: flex;
    background-color: #fff;
}

#drawio-iframe {
    width: 100%;
    height: 100%;
    border: none;
}

</style>
</head>
<body>
    <header>
        <h1>FlowArchitect</h1>
        <p>Paste your LLM-generated CSV to render a Draw.io architecture diagram.</p>
        <button id="copyXmlBtn" title="Generate XML and copy to clipboard">📋 Copy XML</button>
        <button id="downloadBtn" title="Download as .drawio file">💾 Download .drawio</button>
        <button id="renderBtn">Render Diagram</button>
    </header>

    <div class="container">
        <div class="left-pane">
            <textarea id="csvInput">id,name,parent,type,receives_from,step_number
100,Ingest,,phase,,
101,Process,,phase,,
1,Event Hubs,100,event_hubs,,1
2,Process VNet,101,boundary_vnet,,
3,Databricks Subnet,2,boundary_subnet,,
4,Storage Subnet,2,boundary_subnet,,
5,Azure Databricks,3,databricks,1,2
6,ADLS Gen2,4,adls,5,3</textarea>
        </div>
        <div class="right-pane">
            <!-- Draw.io embedded iframe -->
            <iframe id="drawio-iframe" src="https://embed.diagrams.net/?embed=1&ui=min&proto=json&noSaveBtn=1&noExitBtn=1" frameborder="0"></iframe>
        </div>
    </div>
    <!-- XML Output Modal -->
    <div id="xmlModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
        <div style="background:#fff; border-radius:8px; padding:20px; width:80%; max-width:900px; max-height:80vh; display:flex; flex-direction:column; box-shadow:0 8px 32px rgba(0,0,0,0.3);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <h3 style="margin:0; color:#333;">Generated XML — Select All (Ctrl+A) then Copy (Ctrl+C)</h3>
                <button id="closeModal" style="background:none; border:none; font-size:1.5rem; cursor:pointer; color:#666;">✕</button>
            </div>
            <textarea id="xmlOutput" readonly style="flex-grow:1; min-height:300px; font-family:monospace; font-size:12px; padding:12px; border:2px solid #0078d4; border-radius:4px; resize:vertical; background:#fafafa;"></textarea>
            <p style="margin:8px 0 0; color:#666; font-size:0.85rem;">Paste this XML into Draw.io → Extras → Edit Diagram → OK</p>
        </div>
    </div>

    <script>
// ========================================================
// FlowArchitect - XML Generation Engine v2
// ========================================================
// Generates mxGraph XML with precise x,y positioning.
// No reliance on Draw.io's auto-layout.
// ========================================================

const ICON_BASE = 'https://raw.githubusercontent.com/jgraph/drawio/master/src/main/webapp/img/lib/';

const imgStyle = (path) =>
    'image;html=1;image=' + ICON_BASE + path + ';verticalLabelPosition=bottom;verticalAlign=top;align=center;fontSize=11;fontColor=#333333;';

const STENCILS = {
    // ---- Structural ----
    'zone': {
        style: 'rounded=1;whiteSpace=wrap;html=1;fillColor=#E6F2E6;strokeColor=#82b366;fontColor=#333333;fontSize=11;fontStyle=1;verticalAlign=top;spacingTop=5;',
        w: 'auto', h: 'auto'
    },
    'zone_blue': {
        style: 'rounded=1;whiteSpace=wrap;html=1;fillColor=#DAE8FC;strokeColor=#6c8ebf;fontColor=#333333;fontSize=11;fontStyle=1;verticalAlign=top;spacingTop=5;',
        w: 'auto', h: 'auto'
    },
    'governance_bar': {
        style: 'rounded=0;whiteSpace=wrap;html=1;fillColor=#f5f5f5;strokeColor=#cccccc;fontColor=#333333;fontSize=10;fontStyle=0;align=center;verticalAlign=middle;',
        w: 'auto', h: 35
    },
    // ---- Data Sources ----
    'data_source': {
        style: 'rounded=0;whiteSpace=wrap;html=1;fillColor=#ffffff;strokeColor=#333333;fontColor=#333333;fontSize=11;align=center;verticalAlign=middle;',
        w: 120, h: 45
    },
    // ---- Azure Services ----
    'adf':            { style: imgStyle('azure2/databases/Data_Factory.svg'),                  w: 48, h: 48 },
    'databricks':     { style: imgStyle('azure2/analytics/Azure_Databricks.svg'),              w: 48, h: 55 },
    'event_hubs':     { style: imgStyle('azure2/iot/Event_Hubs.svg'),                          w: 48, h: 48 },
    'cosmos_db':      { style: imgStyle('azure2/databases/Azure_Cosmos_DB.svg'),               w: 48, h: 48 },
    'azure_sql':      { style: imgStyle('azure2/databases/SQL_Database.svg'),                  w: 48, h: 48 },
    'powerbi':        { style: imgStyle('azure2/power_platform/PowerBI.svg'),                  w: 48, h: 55 },
    'synapse':        { style: imgStyle('azure2/analytics/Azure_Synapse_Analytics.svg'),       w: 48, h: 48 },
    'stream_analytics': { style: imgStyle('azure2/analytics/Stream_Analytics_Jobs.svg'),       w: 48, h: 48 },
    'purview':        { style: imgStyle('azure2/databases/Azure_Purview_Accounts.svg'),        w: 48, h: 48 },
    'data_catalog':   { style: imgStyle('azure2/integration/Azure_Data_Catalog.svg'),          w: 48, h: 48 },
    'adls':           { style: imgStyle('azure2/storage/Data_Lake_Storage_Gen1.svg'),          w: 48, h: 48 },
    'azure_monitor':  { style: imgStyle('azure2/management_governance/Monitor.svg'),           w: 48, h: 48 },
    'web_app':        { style: imgStyle('azure2/app_services/App_Services.svg'),               w: 48, h: 48 },
    'storage_account':{ style: imgStyle('azure2/storage/Storage_Accounts.svg'),              w: 48, h: 48 },
    'key_vault':      { style: imgStyle('azure2/security/Key_Vaults.svg'),                   w: 48, h: 48 },
    'active_directory':{ style: imgStyle('azure2/identity/Azure_Active_Directory.svg'),      w: 48, h: 48 },
    'kafka':          { style: imgStyle('azure2/iot/Event_Hubs.svg'),                          w: 48, h: 48 },
    // ---- Boundaries ----
    'boundary_vnet': {
        style: 'rounded=1;whiteSpace=wrap;html=1;fillColor=#f8fbff;strokeColor=#0078D4;strokeWidth=2;dashed=1;fontColor=#333333;fontSize=11;fontStyle=1;verticalAlign=top;spacingTop=5;',
        w: 'auto', h: 'auto'
    },
    'boundary_subnet': {
        style: 'rounded=1;whiteSpace=wrap;html=1;fillColor=#ffffff;strokeColor=#cccccc;strokeWidth=1;fontColor=#333333;fontSize=11;fontStyle=1;verticalAlign=top;spacingTop=5;',
        w: 'auto', h: 'auto'
    },
    'boundary_rg': {
        style: 'rounded=1;whiteSpace=wrap;html=1;fillColor=none;strokeColor=#005ba1;strokeWidth=2;fontColor=#333333;fontSize=11;fontStyle=1;verticalAlign=top;spacingTop=5;',
        w: 'auto', h: 'auto'
    },
    'boundary_generic': {
        style: 'rounded=1;whiteSpace=wrap;html=1;fillColor=none;strokeColor=#999999;strokeWidth=2;dashed=1;fontColor=#333333;fontSize=11;fontStyle=1;verticalAlign=top;spacingTop=5;',
        w: 'auto', h: 'auto'
    },
    // ---- Storage layers ----
    'bronze_layer': {
        style: 'rounded=1;whiteSpace=wrap;html=1;fillColor=#FFF2CC;strokeColor=#D6B656;fontColor=#333333;fontSize=11;fontStyle=1;align=center;verticalAlign=middle;',
        w: 120, h: 45
    },
    'silver_layer': {
        style: 'rounded=1;whiteSpace=wrap;html=1;fillColor=#E1D5E7;strokeColor=#9673A6;fontColor=#333333;fontSize=11;fontStyle=1;align=center;verticalAlign=middle;',
        w: 120, h: 45
    },
    'gold_layer': {
        style: 'rounded=1;whiteSpace=wrap;html=1;fillColor=#D5E8D4;strokeColor=#82B366;fontColor=#333333;fontSize=11;fontStyle=1;align=center;verticalAlign=middle;',
        w: 120, h: 45
    },
    // ---- Tools (no Azure icon) ----
    'tool': {
        style: 'rounded=1;whiteSpace=wrap;html=1;fillColor=#ffffff;strokeColor=#666666;fontColor=#333333;fontSize=10;align=center;verticalAlign=middle;',
        w: 70, h: 35
    },
    'consumer': {
        style: 'rounded=1;whiteSpace=wrap;html=1;fillColor=#f0f0f0;strokeColor=#999999;fontColor=#333333;fontSize=10;align=center;verticalAlign=middle;',
        w: 130, h: 40
    },
    // ---- Fallback ----
    'default': {
        style: 'rounded=1;whiteSpace=wrap;html=1;fillColor=#ffffff;strokeColor=#a6a6a6;fontColor=#333333;fontSize=11;',
        w: 120, h: 50
    }
};

// Layout constants (pixels)
const L = {
    leftMargin: 30,
    sourceColW: 140,   // width for the source column (col -1)
    phaseColW: 155,    // width per phase column
    headerY: 10,       // y of phase header labels
    headerH: 28,       // height of header labels
    contentY: 50,      // y start for first content row
    rowH: 100          // vertical spacing between rows
};

// ---- Draw.io iframe communication ----
const iframe = document.getElementById('drawio-iframe');
let iframeReady = false;

window.addEventListener('message', function(evt) {
    if (evt.data && evt.data.length > 0) {
        try {
            const msg = JSON.parse(evt.data);
            if (msg.event === 'init') {
                iframeReady = true;
                console.log('Draw.io iframe ready (init event received)');
                document.getElementById('renderBtn').textContent = 'Render Diagram';
            }
        } catch (e) {}
    }
});

// Fallback: if init event not received after 12s, force ready
setTimeout(() => {
    if (!iframeReady) {
        console.warn('Draw.io init timeout — forcing ready state');
        iframeReady = true;
        document.getElementById('renderBtn').textContent = 'Render Diagram';
    }
}, 12000);

// Show loading state on button
document.getElementById('renderBtn').textContent = 'Loading Draw.io...';

document.getElementById('renderBtn').addEventListener('click', () => {
    if (!iframeReady) {
        alert('Draw.io is still loading. Please wait a moment.');
        return;
    }
    const csv = document.getElementById('csvInput').value.trim();
    if (!csv) return;

    try {
        const xml = buildDiagram(csv);
        console.log('Generated XML:', xml);
        iframe.contentWindow.postMessage(JSON.stringify({
            action: 'load',
            autosave: 1,
            xml: xml
        }), '*');
    } catch (err) {
        console.error('Diagram generation error:', err);
        alert('Error: ' + err.message);
    }
});

// ---- Copy XML — show in modal for manual copy ----
document.getElementById('copyXmlBtn').addEventListener('click', () => {
    const csv = document.getElementById('csvInput').value.trim();
    if (!csv) { alert('No CSV data to convert.'); return; }

    try {
        const xml = buildDiagram(csv);
        const modal = document.getElementById('xmlModal');
        const output = document.getElementById('xmlOutput');
        output.value = xml;
        modal.style.display = 'flex';
        // Auto-select all text so user just hits Ctrl+C
        output.focus();
        output.select();
    } catch (err) {
        alert('Error: ' + err.message);
    }
});

// ---- Close modal ----
document.getElementById('closeModal').addEventListener('click', () => {
    document.getElementById('xmlModal').style.display = 'none';
});
document.getElementById('xmlModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) {
        document.getElementById('xmlModal').style.display = 'none';
    }
});

// ---- Download .drawio file ----
document.getElementById('downloadBtn').addEventListener('click', () => {
    const csv = document.getElementById('csvInput').value.trim();
    if (!csv) { alert('No CSV data to convert.'); return; }

    try {
        const xml = buildDiagram(csv);
        const blob = new Blob([xml], { type: 'application/xml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'architecture.drawio';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        const btn = document.getElementById('downloadBtn');
        btn.textContent = '✅ Downloaded!';
        setTimeout(() => { btn.textContent = '💾 Download .drawio'; }, 2000);
    } catch (err) {
        alert('Error: ' + err.message);
    }
});

// ============================================================
// Main diagram builder: CSV → mxGraph XML
// ============================================================
function buildDiagram(csvText) {
    // --- 1. Parse CSV ---
    const NL = String.fromCharCode(10);
    const lines = csvText.split(NL).filter(l => l.trim());
    const hdrs = lines[0].split(',').map(h => h.trim());
    const idx = name => hdrs.indexOf(name);

    const allNodes = [];
    const byId = {};

    for (let i = 1; i < lines.length; i++) {
        const vals = csvSplit(lines[i]);
        const n = {
            id:            (vals[idx('id')]            || '').trim(),
            name:          (vals[idx('name')]          || '').trim(),
            parent:        (vals[idx('parent')]        || '').trim(),
            type:          (vals[idx('type')]          || '').trim(),
            receives_from: (vals[idx('receives_from')] || '').trim(),
            step_number:   (vals[idx('step_number')]   || '').trim()
        };
        allNodes.push(n);
        byId[n.id] = n;
    }

    // --- 2. Separate phases from content ---
    const phases = allNodes.filter(n => n.type === 'phase');
    const boundaries = allNodes.filter(n => n.type.startsWith('boundary'));
    const content = allNodes.filter(n => n.type !== 'phase' && !n.type.startsWith('boundary'));
    const phaseIdx = {};
    phases.forEach((p, i) => { phaseIdx[p.id] = i; });

    // --- 3. Build edge list ---
    const edges = [];
    content.forEach(n => {
        if (!n.receives_from) return;
        n.receives_from.split(';').forEach(srcId => {
            srcId = srcId.trim();
            if (srcId && byId[srcId]) {
                edges.push({ from: srcId, to: n.id, step: n.step_number });
            }
        });
    });

    function getPhaseId(nodeId) {
        let n = byId[nodeId];
        while (n && n.type !== 'phase' && n.parent) {
            n = byId[n.parent];
        }
        return n && n.type === 'phase' ? n.id : null;
    }

    // --- 4. Assign columns ---
    content.forEach(n => {
        const pId = getPhaseId(n.id);
        if (pId && phaseIdx[pId] !== undefined) {
            n._col = phaseIdx[pId];
        } else if (!n.receives_from) {
            n._col = -1;
        }
    });

    for (let iter = 0; iter < 20; iter++) {
        let changed = false;
        content.forEach(n => {
            if (n._col !== undefined) return;
            const srcs = n.receives_from.split(';').map(s => s.trim()).filter(Boolean);
            const cols = srcs.map(s => byId[s]?._col).filter(c => c !== undefined);
            if (cols.length > 0) {
                n._col = Math.max(...cols) + 1;
                changed = true;
            }
        });
        if (!changed) break;
    }
    content.forEach(n => { if (n._col === undefined) n._col = phases.length; });

    // --- 5. Assign rows within each column ---
    const colBuckets = {};
    content.forEach(n => {
        const c = n._col;
        if (!colBuckets[c]) colBuckets[c] = [];
        colBuckets[c].push(n);
    });
    Object.values(colBuckets).forEach(bucket => {
        bucket.forEach((n, i) => { n._row = i; });
    });

    // Align source nodes (col -1) to their target's row
    // When multiple sources feed the same target, offset them vertically
    if (colBuckets[-1]) {
        const usedRows = new Set();
        colBuckets[-1].forEach(src => {
            const tgtEdge = edges.find(e => e.from === src.id);
            if (tgtEdge && byId[tgtEdge.to]?._row !== undefined) {
                let targetRow = byId[tgtEdge.to]._row;
                // Find next available row starting from target row
                while (usedRows.has(targetRow)) targetRow++;
                src._row = targetRow;
                usedRows.add(targetRow);
            } else {
                // No target edge — keep original row but avoid conflicts
                let row = src._row;
                while (usedRows.has(row)) row++;
                src._row = row;
                usedRows.add(row);
            }
        });
    }

    // --- 6. Compute pixel positions ---
    content.forEach(n => {
        const st = STENCILS[n.type] || STENCILS['default'];
        n._w = (st.w === 'auto') ? 120 : st.w;
        n._h = (st.h === 'auto') ? 50  : st.h;

        if (n._col === -1) {
            n._x = L.leftMargin + (L.sourceColW - n._w) / 2;
        } else {
            const colX = L.leftMargin + L.sourceColW + n._col * L.phaseColW;
            n._x = colX + (L.phaseColW - n._w) / 2;
        }
        n._y = L.contentY + n._row * L.rowH;
    });

    // --- 6.5. Compute Boundary bounding boxes & rel positions ---
    L.boundaryPadding = 30; // padding inside boundary

    const boundaryDepth = (n) => {
        let nParent = byId[n.parent];
        if (nParent && nParent.type && nParent.type.startsWith('boundary')) {
            return 1 + boundaryDepth(nParent);
        }
        return 0;
    };
    
    // Sort boundaries from inner to outer based on nesting depth
    boundaries.sort((a, b) => boundaryDepth(b) - boundaryDepth(a));
    
    boundaries.forEach(b => {
        const children = allNodes.filter(c => c.parent === b.id);
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        children.forEach(c => {
            if (c._x !== undefined && c._w !== undefined) {
                 minX = Math.min(minX, c._x);
                 minY = Math.min(minY, c._y);
                 maxX = Math.max(maxX, c._x + c._w);
                 maxY = Math.max(maxY, c._y + c._h);
            }
        });
        
        if (minX !== Infinity) {
            b._x = minX - L.boundaryPadding;
            b._y = minY - L.boundaryPadding - 20; // Extra top padding for boundary title
            b._w = (maxX - minX) + (L.boundaryPadding * 2);
            b._h = (maxY - minY) + (L.boundaryPadding * 2) + 20;
        } else {
            // Default blank boundary fallback if it has no children
            b._x = 0; b._y = 0; b._w = 150; b._h = 100;
        }
    });

    // Convert absolute positions relative to parent boundary
    allNodes.forEach(n => {
        if (n.parent && byId[n.parent] && byId[n.parent].type.startsWith('boundary')) {
            const p = byId[n.parent];
            if (p._x !== undefined && n._x !== undefined) {
               n._rel_x = n._x - p._x;
               n._rel_y = n._y - p._y;
            }
        }
    });
    
    // Apply relative positions
    allNodes.forEach(n => {
        if (n._rel_x !== undefined) {
            n._x = n._rel_x;
            n._y = n._rel_y;
        }
    });

    // --- 7. Generate XML ---
    let nid = 100;
    let xml = '';

    // Phase column headers
    phases.forEach((p, i) => {
        const x = L.leftMargin + L.sourceColW + i * L.phaseColW;
        xml += mxVertex(nid++, esc(p.name),
            'text;html=1;align=center;verticalAlign=middle;strokeColor=none;fillColor=none;fontSize=13;fontStyle=1;fontColor=#333333;',
            x, L.headerY, L.phaseColW, L.headerH);
    });

    // Content nodes
    const cellMap = {};
    boundaries.forEach(b => { cellMap[b.id] = nid++; });
    content.forEach(n => { cellMap[n.id] = nid++; });

    boundaries.forEach(b => {
        const cid = cellMap[b.id];
        const st = STENCILS[b.type] || STENCILS['default'];
        const pId = (b.parent && cellMap[b.parent]) ? cellMap[b.parent] : 1;
        xml += mxVertex(cid, esc(b.name), st.style, b._x, b._y, b._w, b._h, pId);
    });

    content.forEach(n => {
        const cid = cellMap[n.id];
        const st = STENCILS[n.type] || STENCILS['default'];
        const pId = (n.parent && cellMap[n.parent]) ? cellMap[n.parent] : 1;
        xml += mxVertex(cid, esc(n.name), st.style, n._x, n._y, n._w, n._h, pId);
    });

    // Edges with optional green step badges
    edges.forEach(e => {
        const eid = nid++;
        const sid = cellMap[e.from];
        const tid = cellMap[e.to];
        if (!sid || !tid) return;

        let style = 'edgeStyle=orthogonalEdgeStyle;rounded=1;html=1;strokeColor=#333333;strokeWidth=1.5;';
        if (e.step) {
            style += 'labelBackgroundColor=#107c41;fontColor=#ffffff;fontSize=11;fontStyle=1;';
        }
        xml += mxEdge(eid, e.step || '', style, sid, tid);
    });

    return '<mxGraphModel><root><mxCell id="0"/><mxCell id="1" parent="0"/>' + xml + '</root></mxGraphModel>';
}

// ---- XML element helpers ----
function mxVertex(id, value, style, x, y, w, h, parentId = 1) {
    return '<mxCell id="' + id + '" value="' + value + '" style="' + style +
           '" vertex="1" parent="' + parentId + '"><mxGeometry x="' + x + '" y="' + y +
           '" width="' + w + '" height="' + h + '" as="geometry"/></mxCell>';
}

function mxEdge(id, value, style, source, target) {
    return '<mxCell id="' + id + '" value="' + value + '" style="' + style +
           '" edge="1" source="' + source + '" target="' + target +
           '" parent="1"><mxGeometry relative="1" as="geometry"/></mxCell>';
}

function esc(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;')
              .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function csvSplit(line) {
    const result = [];
    let cur = '';
    let inQ = false;
    for (const ch of line) {
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
        else { cur += ch; }
    }
    result.push(cur);
    return result;
}

</script>
