<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowArchitect: LLM to Draw.io</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>FlowArchitect</h1>
        <p>Paste your LLM-generated CSV to render a Draw.io architecture diagram.</p>
        <button id="renderBtn">Render Diagram</button>
    </header>

    <div class="container">
        <div class="left-pane">
            <textarea id="csvInput">id,name,parent,type,connects_to,connection_label
1,Streaming Data,,event_hubs,2,Ingest
2,Databricks Processing,,databricks_container,,
3,Bronze Table,2,delta_table,4,Cleanse
4,Silver Table,2,delta_table,5,Aggregate
5,Gold Table,2,delta_table,6,Serve
6,Databricks SQL,,azure_sql,7,Query
7,PowerBI Dashboards,,powerbi,,</textarea>
        </div>
        <div class="right-pane">
            <!-- Draw.io embedded iframe -->
            <iframe id="drawio-iframe" src="https://embed.diagrams.net/?embed=1&ui=min&spin=1&proto=json" frameborder="0"></iframe>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
