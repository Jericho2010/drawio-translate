<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowArchitect: LLM to Draw.io</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>FlowArchitect</h1>
        <p>Paste your LLM-generated CSV to render a Draw.io architecture diagram.</p>
        <button id="renderBtn">Render Diagram</button>
    </header>

    <div class="container">
        <div class="left-pane">
            <textarea id="csvInput">id,name,parent,type,receives_from,step_number
10,Ingest,,phase,,
11,Process,,phase,,
12,Store,,phase,,
13,Analyze/Report,,phase,,
1,Data source 1: Fare data,,data_source,,
2,Data source 2: Trip data,,data_source,,
3,Event Hubs,10,event_hubs,1,1
4,Event Hubs,10,event_hubs,2,1
5,Azure Databricks,11,databricks,3,2
6,Data source 3: Neighborhood data,11,data_source,,
7,Azure Cosmos DB,12,cosmos_db,5,3
8,PowerBI,13,powerbi,7,4
9,Azure Monitor,,azure_monitor,5,5
14,Dashboard,,dashboard,9,</textarea>
        </div>
        <div class="right-pane">
            <!-- Draw.io embedded iframe -->
            <iframe id="drawio-iframe" src="https://embed.diagrams.net/?embed=1&ui=min&spin=1&proto=json" frameborder="0"></iframe>
        </div>
    </div>

    <script src="js/app.js?v=2"></script>
</body>
</html>
