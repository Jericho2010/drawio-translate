<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowArchitect: LLM to Draw.io (v5)</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img id="logo-img" src="./flowarchitect_logo.png" alt="FA Logo">
            <h1>FlowArchitect</h1>
        </div>
        <p>Architectural Intelligence Interface v7.1</p>
        <div class="btn-group">
            <button id="copyXmlBtn" title="Copy XML and paste into Draw.io (Extras -> Edit Diagram)">📋 Copy XML to Draw.io</button>
            <button id="renderBtn">Render Diagram</button>
        </div>
    </header>

    <div class="workflow-stepper">
        <div class="step" id="step-1" title="Click to copy System Prompt">
            <svg class="step-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            <span class="step-label">1. PROMPT.md</span>
            <div class="step-connector"></div>
        </div>
        <div class="step" id="step-2" title="LLM Instructions">
            <svg class="step-icon" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path><path d="M8 9h8"></path><path d="M8 13h6"></path></svg>
            <span class="step-label">2. LLM CHAT</span>
            <div class="step-connector"></div>
        </div>
        <div class="step" id="step-3" title="Insert CSV Data below">
            <svg class="step-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line></svg>
            <span class="step-label">3. CSV DATA</span>
            <div class="step-connector"></div>
        </div>
        <div class="step" id="step-4" title="Render to preview">
            <svg class="step-icon" viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
            <span class="step-label">4. FLOWARCHITECT</span>
            <div class="step-connector"></div>
        </div>
        <div class="step" id="step-5" title="Click to open Draw.io in new tab">
            <svg class="step-icon" viewBox="0 0 24 24"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
            <span class="step-label">5. DRAW.IO</span>
        </div>
    </div>

    <!-- Modals -->
    <div id="xmlModal" class="modal-overlay">
        <div class="modal-content">
            <h3>Diagram XML Ready</h3>
            <p>Paste this into Draw.io (<b>Extras -> Edit Diagram</b>)</p>
            <textarea id="xmlOutput" readonly></textarea>
            <div class="modal-btns">
                <button id="xmlCopyBtn" class="premium-btn">📋 Copy to Clipboard</button>
                <button id="closeModal">Close</button>
            </div>
        </div>
    </div>

    <div id="infoModal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="infoTitle">Info</h3>
            <div id="infoBody"></div>
            <div class="modal-btns">
                <button id="infoCopyBtn" style="display:none;">📋 Copy to Clipboard</button>
                <button id="closeInfoModal">Close</button>
            </div>
        </div>
    </div>

    <div id="prompt-storage" style="display:none;"></div>

    <div class="container">
        <div class="left-pane">
            <div class="pane-label">
                <span>CSV SOURCE</span>
                <span id="sync-status">● SYNCED</span>
            </div>
            <textarea id="csvInput">id,name,parent,type,receives_from,step_number
100,Ingest,,phase,,
101,Process,,phase,,
1,Event Hubs,100,event_hubs,,1
2,Process VNet,101,boundary_vnet,,
3,Databricks Subnet,2,boundary_subnet,,
4,Storage Subnet,2,boundary_subnet,,
5,Azure Databricks,3,databricks,1,2
6,ADLS Gen2,4,adls,5,3</textarea>
        </div>
        <div class="right-pane">
            <!-- Draw.io embedded iframe -->
            <iframe id="drawio-iframe" src="https://embed.diagrams.net/?embed=1&ui=min&proto=json&noSaveBtn=1&noExitBtn=1" frameborder="0"></iframe>
        </div>
    </div>
    <script src="js/globals.js"></script>
    <script src="js/stencils/databricks.js"></script>
    <script src="js/stencils/snowflake.js"></script>
    <script src="js/stencils/fabric.js"></script>
    <script src="js/app.js?v=7.2"></script>
</body>
</html>
